name: Publish GitHub Package

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@dev-teamremited'
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test

      - name: Build package
        run: yarn prepare

      - name: Publish to GitHub Packages
        run: yarn npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN || github.token }}
          YARN_NPM_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN || github.token }}
