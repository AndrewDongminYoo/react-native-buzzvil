# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.19.5
    - java@13.0.11
    - node@18.12.1
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - dotenv-linter
  ignore:
    - linters: [shellcheck, shfmt]
      paths: [example/android/gradlew]
    - linters: [trufflehog]
      paths: [.yarn/releases/yarn-4.11.0.cjs, yarn.lock]
  enabled:
    - actionlint@1.6.9
    - checkov@3.3.1
    - git-diff-check
    - ktlint@0.43.2
    - markdownlint@0.48.0
    - osv-scanner@1.3.6
    - oxipng@7.0.0
    - prettier@3.8.4
    - shellcheck@0.8.0
    - shfmt@3.6.0
    - trivy@0.37.1
    - trufflehog@3.31.3
    - yamllint@1.38.0
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
