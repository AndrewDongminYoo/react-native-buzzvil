# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - java@13.0.11
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - dotenv-linter
  ignore:
    - linters: [osv-scanner]
      paths: [example/ios/Podfile.lock]
    - linters: [shellcheck, shfmt]
      paths: [example/android/gradlew]
    - linters: [trufflehog]
      paths: [.yarn/releases/yarn-4.11.0.cjs, yarn.lock]
    - linters: [eslint]
      paths:
        - .yarn/releases/yarn-4.11.0.cjs
        - eslint.config.mjs
        - example/vite.config.mjs
    - linters: [yamllint]
      paths: [.github/workflows/*.yml]
  enabled:
    - eslint@9.39.4
    - grype@0.114.0
    - pinact@4.1.0
    - actionlint@1.7.12
    - checkov@3.3.1
    - git-diff-check
    - ktlint@1.8.0
    - markdownlint@0.48.0
    - osv-scanner@2.3.8
    - oxipng@10.1.1
    - prettier@3.8.4
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - trivy@0.71.0
    - trufflehog@3.95.5
    - yamllint@1.38.0
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
