buildscript {
  ext.Buzzvil = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return Buzzvil[prop]
  }

  repositories {
    google()
    mavenCentral()
    gradlePluginPortal()
    maven { url "https://dl.buzzvil.com/public/maven" }
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.buzzvil"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
}

dependencies {
  implementation "com.facebook.react:react-android"

  // Buzzvil BuzzBenefit v6 SDK. The buzzvil-bom pins versions for buzzvil-sdk
  // and its sub-modules. The Maven repo (dl.buzzvil.com/public/maven) is
  // declared in the consumer's settings.gradle, not here — RNGP runs in
  // FAIL_ON_PROJECT_REPOS mode, which rejects module-level repositories {}.
  api platform("com.buzzvil:buzzvil-bom:6.7.+")
  implementation "com.buzzvil:buzzvil-sdk"

  // The SDK BuzzBannerView extends androidx ConstraintLayout. It is present
  // transitively on the runtime classpath, but the Kotlin compiler needs the
  // supertype on the COMPILE classpath to resolve com.buzzvil.buzzbanner.BuzzBannerView.
  implementation "androidx.constraintlayout:constraintlayout:2.0.1"
}
